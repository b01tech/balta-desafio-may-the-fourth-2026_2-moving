<div class="item-add">
  <h2>➕ Adicionar Item</h2>
  <p class="subtitle">Adicione um novo item a uma caixa</p>
  
  <div class="form">
    <div class="form-group">
      <label for="nome">Nome do Item *</label>
      <input 
        id="nome"
        type="text" 
        [value]="nome()"
        (input)="nome.set($any($event.target).value)"
        placeholder="Ex: Carregador do notebook"
      />
    </div>
    
    <div class="form-group">
      <label for="descricao">Descrição (opcional)</label>
      <input 
        id="descricao"
        type="text" 
        [value]="descricao()"
        (input)="descricao.set($any($event.target).value)"
        placeholder="Ex: Carregador Dell 65W"
      />
    </div>
    
    <div class="form-group">
      <label for="caixa">Caixa *</label>
      <select 
        id="caixa"
        [value]="caixaId()"
        (change)="caixaId.set(+$any($event.target).value)"
      >
        @for (caixa of caixas(); track caixa.id) {
          <option [value]="caixa.id">Caixa {{ caixa.numero }} - {{ caixa.descricao || 'Sem descrição' }}</option>
        }
      </select>
    </div>
    
    <button 
      class="btn-adicionar"
      (click)="adicionar()"
      [disabled]="loading()"
    >
      {{ loading() ? 'Adicionando...' : 'Adicionar Item' }}
    </button>
  </div>
  
  @if (success()) {
    <div class="success">{{ success() }}</div>
  }
  
  @if (error()) {
    <div class="error">{{ error() }}</div>
  }
</div>
